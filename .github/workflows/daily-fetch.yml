name: daily-market-fetch

# Runs every weekday at 18:00 UTC (after both US & Oslo closes).
# Adjust the cron if you want a different time. Cron is in UTC.
on:
  schedule:
    - cron: "0 18 * * 1-5"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write          # needed so the job can commit the updated DB back

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily fetch
        env:
          # Store your FRED key as a repo secret (Settings > Secrets > Actions),
          # NOT in config.py. This injects it at runtime.
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python fetch_data.py

      - name: Commit updated database
        run: |
          git config user.name "market-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -f market_data.db
          git commit -m "Daily data update $(date -u +%Y-%m-%d)" || echo "No changes to commit"
          git push
